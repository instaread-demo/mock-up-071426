document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"b689d12f-23e8-4f9d-95a7-52cf6eee7fdc\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  a { color: #0f9bb0; text-decoration: none; }\n  a:hover { color: #0b7686; text-decoration: underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div data-screen-label=\"Demo disclaimer (top)\" style=\"position:fixed; top:0; left:0; right:0; height:44px; z-index:9999; background:#141414; border-bottom:2px solid #ffd400; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 16px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:14px;\">⚠ DEMO ONLY — Non-commercial recreation for demonstration purposes only. Not affiliated with Cureus, Netflix, or Instaread.<\u002Fspan>\n<\u002Fdiv>\n<div data-screen-label=\"Demo disclaimer (bottom-left)\" style=\"position:fixed; bottom:16px; left:16px; z-index:9999; background:#141414; border:2px solid #ffd400; border-radius:8px; padding:8px 14px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; box-shadow:0 4px 14px rgba(0,0,0,0.4);\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:13px;\">DEMO ONLY · For demonstration purposes<\u002Fspan>\n<\u002Fdiv>\n\n<div style=\"padding-top:44px; background:#ffffff; min-height:100vh; font-family:Georgia,'Times New Roman',serif; color:#2b2b2b;\" data-screen-label=\"Cureus article\">\n\n  <img src=\"cc14dc33-6705-4e31-89fd-580900e6d22c\" alt=\"Cureus Journal of Medical Science\" style=\"display:block; width:100%; height:auto;\">\n\n  <div style=\"max-width:1180px; margin:0 auto; padding:26px 24px 80px; display:flex; gap:44px; align-items:flex-start;\">\n    <div style=\"flex:1 1 auto; min-width:0; max-width:760px;\">\n\n      <figure style=\"margin:0 0 26px;\">\n        <img src=\"491c5fe0-14d7-46e8-9215-c40419f80a3d\" alt=\"Clinical Utility of Intracellular Organisms in Gram-Stained Sputum Among Patients With Methicillin-Resistant Staphylococcus aureus Pneumonia\" style=\"display:block; width:100%; height:auto;\">\n      <\u002Ffigure>\n      <div style=\"font-family:Arial,sans-serif; font-size:12.5px; line-height:1.6; color:#666; text-align:center; border-top:1px solid #eee; border-bottom:1px solid #eee; padding:14px 0; margin-bottom:24px;\">Cite this article as: Herai Y, Taniguchi T, Yokota S, et al. (July 13, 2026) Clinical Utility of Intracellular Organisms in Gram-Stained Sputum Among Patients With Methicillin-Resistant Staphylococcus aureus Pneumonia. Cureus 18(7): e112615. doi:10.7759/cureus.112615<\u002Fdiv>\n\n      <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#17a2b8\" hint-size=\"100%,140px\" style=\"margin:0 0 26px; display:block;\"><\u002Fdc-import>\n\n      <div style=\"display:flex; gap:8px; background:#1a1a1a; border-radius:26px; padding:5px; margin-bottom:32px; font-family:Arial,sans-serif; font-size:13.5px; font-weight:600;\">\n        <span style=\"background:#fff; color:#1a1a1a; padding:9px 22px; border-radius:22px;\">Article<\u002Fspan>\n        <span style=\"color:#ccc; padding:9px 18px;\">Authors etc.<\u002Fspan>\n        <span style=\"color:#ccc; padding:9px 18px;\">Metrics<\u002Fspan>\n        <span style=\"color:#ccc; padding:9px 18px;\">Media<\u002Fspan>\n        <span style=\"color:#ccc; padding:9px 18px;\">Comments<\u002Fspan>\n      <\u002Fdiv>\n\n      <h2 style=\"font-size:26px; font-weight:700; color:#1a1a1a; margin:0 0 16px;\">Abstract<\u002Fh2>\n      <p style=\"font-size:16px; line-height:1.75; margin:0 0 20px;\"><strong>Introduction:<\u002Fstrong> Sputum cultures may detect bacteria that are not the true causative pathogens of pneumonia. Gram-stained sputum has demonstrated utility in the diagnosis and treatment of pneumonia.<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.75; margin:0 0 20px;\"><strong>Gap statement:<\u002Fstrong> However, the clinical significance of intracellular organisms (ICOs) observed in Gram-stained sputum has not been fully elucidated.<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.75; margin:0 0 20px;\"><strong>Aim:<\u002Fstrong> This study aimed to evaluate whether the presence of ICOs morphologically consistent with <em>Staphylococcus<\u002Fem> species in Gram-stained sputum specimens is associated with the diagnosis of methicillin-resistant <em>Staphylococcus aureus<\u002Fem> (MRSA) pneumonia and the clinical response to anti-MRSA therapy.<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.75; margin:0 0 20px;\"><strong>Methodology:<\u002Fstrong> A retrospective matched case-control study was conducted between January 2010 and December 2022. Patients who underwent sputum smear and culture testing at Chiba University Hospital were included.<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.75; margin:0 0 20px;\"><strong>Results:<\u002Fstrong> Of the 1,075 patients who underwent sputum testing, 65 patients with ICO were identified and matched 1:1 with 65 patients without ICO for analysis. Among these, 30 patients (46.2%) in the ICO-positive group were diagnosed with MRSA pneumonia, compared with 21 patients (32.3%) in the ICO-negative group. The risk difference was 13.9% (bootstrapped 95% CI -3.8% to 30.5%), and the difference was not statistically significant (p = 0.15).<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.75; margin:0 0 28px;\"><strong>Conclusion:<\u002Fstrong> The presence of ICOs in sputum samples was not significantly associated with MRSA pneumonia and may have limited utility in predicting the clinical response to anti-MRSA therapy.<\u002Fp>\n\n      <h2 style=\"font-size:26px; font-weight:700; color:#1a1a1a; margin:0 0 16px;\">Introduction<\u002Fh2>\n      <p style=\"font-size:16px; line-height:1.75; margin:0 0 20px;\">When bacteria breach the body’s physical barriers, such as mucosal surfaces and the host microbiota, phagocytic cells are activated. Innate immunity is then initiated within hours of bacterial invasion, typically more rapidly than adaptive immunity [1].<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.75; margin:0 0 20px;\">Generally, Gram stains may reveal the presence of microorganisms within white blood cells (WBCs), including leukocytes. These microorganisms are referred to as intracellular organisms (ICO) and may result from either phagocytosis or microbial growth. In cases of ventilator-associated pneumonia (VAP), an ICO percentage exceeding 1.5%-2% in bronchoalveolar lavage fluid (BALF), suggesting a high likelihood of bacterial pneumonia, has been reported [2,3].<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.75; margin:0;\">Notably, bacteria identified through sputum culture may not necessarily represent the true causative pathogens of pneumonia. This study focused on methicillin-resistant Staphylococcus aureus (MRSA) and aimed to investigate whether the presence of ICO aids in the diagnosis of MRSA pneumonia and predicts the clinical response to anti-MRSA therapy.<\u002Fp>\n\n    <\u002Fdiv>\n\n    <aside style=\"flex:0 0 280px; width:280px; font-family:Arial,Helvetica,sans-serif;\">\n      <div style=\"border:1px solid #eee; border-radius:6px; padding:18px; margin-bottom:22px;\">\n        <div style=\"font-size:12px; letter-spacing:0.08em; color:#17a2b8; font-weight:800; margin-bottom:8px;\">NEW TO CUREUS?<\u002Fdiv>\n        <div style=\"font-size:13.5px; color:#555; margin-bottom:12px;\">Step-by-step guidance to publish your first article<\u002Fdiv>\n        <div style=\"background:#f5a623; color:#fff; font-weight:800; font-size:12px; text-align:center; padding:9px; border-radius:4px;\">START HERE<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:18px; font-weight:800; color:#1a1a1a; margin-bottom:14px;\">Popular Related Articles<\u002Fdiv>\n      <sc-for list=\"{{ related }}\" as=\"r\" hint-placeholder-count=\"4\">\n        <div style=\"padding:12px 0; border-top:1px solid #eee;\">\n          <a href=\"#\" style=\"font-size:14px; line-height:1.4; color:#333; font-weight:600;\">{{ r.title }}<\u002Fa>\n          <div style=\"font-size:12.5px; color:#888; margin-top:5px;\">{{ r.authors }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      related: [\n        { title: 'Ivermectin: A Multifaceted Drug With a Potential Beyond Anti-parasitic Therapy', authors: 'Baneet Kaur, Cyril Blavo' },\n        { title: 'Ivermectin Prophylaxis Used for COVID-19: A Citywide, Prospective, Observational Study of 223,128 Subjects', authors: 'Lucy Kerr, Flavio A. Cadegiani +7 more' },\n        { title: 'Rapid Recovery From Cocaine-Induced Cardiomyopathy: A Case Report', authors: 'Ibrahim Kamel, Amr Saleh +2 more' },\n        { title: 'Verruca Vulgaris Occurring on a Tattoo: Case Report and Review of Tattoo-Associated Human Papillomavirus Infections', authors: 'Philip R. Cohen' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
