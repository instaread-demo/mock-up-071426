  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

.5px; color:#333; flex-wrap:wrap;\">\n      <span>All Topics<\u002Fspan><span>Latest<\u002Fspan><span>Home<\u002Fspan><span>Arts<\u002Fspan><span>Business<\u002Fspan><span style=\"color:#1b4d8f; font-weight:700;\">Health<\u002Fspan><span>Immigration<\u002Fspan><span>Politics<\u002Fspan><span>Events<\u002Fspan><span>Tiempos<\u002Fspan><span>Neighborhood News ▾<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1200px; margin:0 auto; padding:34px 24px 80px; display:flex; gap:56px; align-items:flex-start;\">\n    <div style=\"flex:1 1 auto; min-width:0; max-width:720px;\">\n\n      <div style=\"display:flex; align-items:center; gap:9px; margin-bottom:16px; font-family:Arial,sans-serif;\">\n        <span style=\"width:13px; height:13px; background:#1b4d8f; display:inline-block;\"><\u002Fspan>\n        <span style=\"font-size:14px; font-weight:800; letter-spacing:0.05em; color:#555;\">HEALTH<\u002Fspan>\n      <\u002Fdiv>\n\n      <h1 style=\"font-family:Arial,Helvetica,sans-serif; font-size:41px; line-height:1.16; font-weight:800; color:#1a1a1a; margin:0 0 26px; letter-spacing:-0.02em;\">$50M backs push by UC researchers to tackle ‘big open question mark’ in women’s brain health<\u002Fh1>\n\n      <div style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:26px; font-family:Arial,sans-serif;\">\n        <div style=\"display:flex; align-items:center; gap:12px;\">\n          <img src=\"3b18da3f-bfee-4070-b264-075b2f0107a4\" alt=\"Elizabeth Ireland\" style=\"width:42px; height:42px; border-radius:4px; object-fit:cover; flex:0 0 auto;\">\n          <div style=\"font-size:14.5px; color:#555;\">by <a href=\"#\" style=\"color:#1a1a1a; font-weight:700;\">Elizabeth Ireland<\u002Fa> • Times of San Diego &nbsp;&nbsp;<span style=\"color:#999;\">July 11, 2026, 2:00 p.m.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:0 0 auto; display:flex; align-items:center; gap:8px; font-size:12px; color:#666;\">Share this:\n          <span style=\"width:26px; height:26px; border-radius:50%; background:#111; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px;\">𝕏<\u002Fspan>\n          <span style=\"width:26px; height:26px; border-radius:50%; background:#1877f2; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px;\">f<\u002Fspan>\n          <span style=\"width:26px; height:26px; border-radius:50%; background:#e0242a; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px;\">◯<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#1b4d8f\" hint-size=\"100%,140px\" style=\"margin:0 0 28px; display:block;\"><\u002Fdc-import>\n\n      <figure style=\"margin:0 0 8px;\">\n        <img src=\"44bed332-9a7a-418b-919d-8a33d79a7409\" alt=\"A patient and physician discuss an MRI of the brain\" style=\"display:block; width:100%; height:auto;\">\n      <\u002Ffigure>\n      <div style=\"font-family:Arial,sans-serif; font-size:13px; color:#8a8f97; margin:0 0 26px;\">A patient and physician discuss an MRI of the brain. (Photo courtesy of UC San Diego News)<\u002Fdiv>\n\n      <p style=\"font-size:19px; line-height:1.7; margin:0 0 24px;\">Women are nearly twice as likely as men to develop Alzheimer’s disease, but scientists haven’t locked down what drives that disparity.<\u002Fp>\n      <p style=\"font-size:19px; line-height:1.7; margin:0 0 24px;\">New research at UC San Diego seeks to help doctors understand why.<\u002Fp>\n      <p style=\"font-size:19px; line-height:1.7; margin:0 0 24px;\">“There’s a big open question mark around menopause,” said Judy Pa, PhD, professor of neurosciences at <a href=\"#\">UCSD School of Medicine<\u002Fa> and director of the <a href=\"#\">Alzheimer’s Disease Cooperative Study<\u002Fa>.<\u002Fp>\n      <p style=\"font-size:19px; line-height:1.7; margin:0 0 24px;\">Pa and colleagues within the UC system have received two major research awards, granted over three years, as part of a more than $50 million investment in women’s brain health led by <a href=\"#\">Wellcome Leap CARE<\u002Fa> and other organizations.<\u002Fp>\n      <p style=\"font-size:19px; line-height:1.7; margin:0 0 24px;\">These awards will fund an investigation into how menopause and hormone therapy may influence women’s risk of dementia, as well as the development of an artificial intelligence tool for earlier detection of Alzheimer’s disease.<\u002Fp>\n      <p style=\"font-size:19px; line-height:1.7; margin:0 0 24px;\">The hormone therapy project led by Pa will use existing datasets to emulate a clinical trial, allowing researchers to study how women who initiate menopausal hormone therapy compare over time with similar women who do not.<\u002Fp>\n      <p style=\"font-size:19px; line-height:1.7; margin:0 0 24px;\">By analyzing long-term health and cognitive outcomes, the team hopes to generate stronger evidence about whether hormone therapy may alter dementia risk and which therapies may be most appropriate for women with different menopausal experiences.<\u002Fp>\n      <p style=\"font-size:19px; line-height:1.7; margin:0;\">The grants reflect a broader wave of attention to a field that has been overlooked for decades.<\u002Fp>\n\n    <\u002Fdiv>\n\n    <aside style=\"flex:0 0 320px; width:320px; font-family:Arial,Helvetica,sans-serif;\">\n      <div style=\"height:60px;\"><\u002Fdiv>\n      <h2 style=\"font-family:Georgia,serif; font-size:30px; font-weight:800; line-height:1.15; color:#1a1a1a; margin:0 0 18px;\">Free neighborhood news in your inbox<\u002Fh2>\n      <p style=\"font-size:14.5px; line-height:1.6; color:#444; margin:0 0 20px;\">Join the 20,000+ people who get Times of San Diego in their inbox at 7 a.m. daily – plus breaking news alerts. And we have weekly updates from San Diego neighborhoods – select community news below.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px 16px; font-size:14.5px; color:#222; margin-bottom:20px;\">\n        <div style=\"display:flex; gap:8px;\"><span style=\"width:16px; height:16px; border:1px solid #999; flex:0 0 auto;\"><\u002Fspan>Pacific/Mission Beach<\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\"><span style=\"width:16px; height:16px; border:1px solid #999; flex:0 0 auto;\"><\u002Fspan>Downtown<\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\"><span style=\"width:16px; height:16px; border:1px solid #999; flex:0 0 auto;\"><\u002Fspan>La Jolla<\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\"><span style=\"width:16px; height:16px; border:1px solid #999; flex:0 0 auto;\"><\u002Fspan>Uptown<\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\"><span style=\"width:16px; height:16px; border:1px solid #999; flex:0 0 auto;\"><\u002Fspan>Point Loma/OB<\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\"><span style=\"width:16px; height:16px; border:1px solid #999; flex:0 0 auto;\"><\u002Fspan>Navajo/College Area<\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\"><span style=\"width:16px; height:16px; border:1px solid #999; flex:0 0 auto;\"><\u002Fspan>Mission Valley<\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\"><span style=\"width:16px; height:16px; border:1px solid #999; flex:0 0 auto;\"><\u002Fspan>North County<\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\"><span style=\"width:16px; height:16px; border:1px solid #999; flex:0 0 auto;\"><\u002Fspan>South Bay<\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\"><span style=\"width:16px; height:16px; border:1px solid #999; flex:0 0 auto;\"><\u002Fspan>La Mesa<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:8px; margin-bottom:6px;\"><span style=\"width:16px; height:16px; background:#1b4d8f; color:#fff; font-size:12px; display:flex; align-items:center; justify-content:center; flex:0 0 auto;\">✓<\u002Fspan><span style=\"font-size:14.5px; color:#2
