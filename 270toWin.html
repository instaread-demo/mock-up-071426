  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"ce2d103b-10a4-4049-89fe-0a3a4891f6ec\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  a { color: #c0392b; text-decoration: none; }\n  a:hover { color: #96271c; text-decoration: underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div data-screen-label=\"Demo disclaimer (top)\" style=\"position:fixed; top:0; left:0; right:0; height:44px; z-index:9999; background:#141414; border-bottom:2px solid #ffd400; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 16px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:14px;\">⚠ DEMO ONLY — Non-commercial recreation for demonstration purposes only. Not affiliated with 270toWin, Netflix, or Instaread.<\u002Fspan>\n<\u002Fdiv>\n<div data-screen-label=\"Demo disclaimer (bottom-left)\" style=\"position:fixed; bottom:16px; left:16px; z-index:9999; background:#141414; border:2px solid #ffd400; border-radius:8px; padding:8px 14px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; box-shadow:0 4px 14px rgba(0,0,0,0.4);\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:13px;\">DEMO ONLY · For demonstration purposes<\u002Fspan>\n<\u002Fdiv>\n\n<div style=\"padding-top:44px; background:#ffffff; min-height:100vh; font-family:'Segoe UI',Helvetica,Arial,sans-serif; color:#333;\" data-screen-label=\"270toWin article\">\n\n  <img src=\"4f8fe31c-9e2c-404f-be9a-1b77d23fafa8\" alt=\"270toWin\" style=\"display:block; width:100%; height:auto;\">\n\n  <div style=\"max-width:1160px; margin:0 auto; padding:34px 24px 80px; display:flex; gap:48px; align-items:flex-start;\">\n    <div style=\"flex:1 1 auto; min-width:0; max-width:720px;\">\n\n      <h1 style=\"font-size:30px; line-height:1.24; font-weight:700; color:#1a1a1a; margin:0 0 10px;\">Timeline for Filling the South Carolina Senate Vacancy<\u002Fh1>\n      <div style=\"font-size:14px; color:#666; margin-bottom:6px;\">By 270toWin Staff<\u002Fdiv>\n      <div style=\"font-size:14px; color:#666; margin-bottom:18px;\">July 13, 2026, 8:49 AM ET<\u002Fdiv>\n      <div style=\"display:flex; gap:8px; margin-bottom:26px;\">\n        <span style=\"width:30px; height:30px; border-radius:50%; background:#25d366; color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px;\">✆<\u002Fspan>\n        <span style=\"width:30px; height:30px; border-radius:50%; background:#1877f2; color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px;\">f<\u002Fspan>\n        <span style=\"width:30px; height:30px; border-radius:50%; background:#0084ff; color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px;\">✉<\u002Fspan>\n        <span style=\"width:30px; height:30px; border-radius:50%; background:#111; color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px;\">𝕏<\u002Fspan>\n      <\u002Fdiv>\n\n      <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#c0392b\" hint-size=\"100%,140px\" style=\"margin:0 0 28px; display:block;\"><\u002Fdc-import>\n\n      <p style=\"font-size:17px; line-height:1.7; margin:0 0 22px;\">South Carolina Republican Sen. Lindsey Graham <a href=\"#\">died Saturday night<\u002Fa>. He was 71. Gov. Henry McMaster (R) is expected to appoint a temporary successor fairly quickly. The appointee will complete Graham’s term, serving until the new Congress convenes on January 3, 2027.<\u002Fp>\n      <p style=\"font-size:17px; line-height:1.7; margin:0 0 22px;\">Graham won renomination for a new six-year term in last month’s South Carolina primary. A special Republican primary will take place on August 11 to select a new nominee. The winner will face Democrat Annie Andrews and any qualifying third-party candidates in the November 3 general election.<\u002Fp>\n      <p style=\"font-size:17px; line-height:1.7; margin:0 0 22px;\">Prediction markets allow traders to speculate on how the situation will play out. But even for readers with no interest in participating, they provide a real-time snapshot of how expectations evolve as new information emerges.<\u002Fp>\n      <p style=\"font-size:17px; line-height:1.7; font-style:italic; color:#555; margin:0 0 26px;\">270toWin has partnered with Kalshi to show relevant prediction market content on the site and alongside live results through the 2026 midterm elections.<\u002Fp>\n\n      <div style=\"border-top:1px solid #e6e6e6; padding-top:24px;\"><\u002Fdiv>\n      <h2 style=\"font-size:20px; font-weight:700; color:#1a1a1a; margin:0 0 16px;\">Who will McMaster appoint?<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.7; margin:0 0 22px;\">Broadly speaking, the governor could appoint a potential candidate, giving that person a <a href=\"#\">head start<\u002Fa> in the special primary. Alternatively, he could stay out of the nominating contest by choosing a caretaker who is unlikely to seek a full term.<\u002Fp>\n      <p style=\"font-size:17px; line-height:1.7; margin:0 0 22px;\">Speculation has centered on Lt. Gov. Pamela Evette, who recently <a href=\"#\">lost a primary runoff<\u002Fa> to succeed McMaster. Evette had received Donald Trump’s initial endorsement in that race.<\u002Fp>\n      <p style=\"font-size:17px; line-height:1.7; margin:0 0 22px;\">Darline Graham Nordone, the late Senator’s sister, has been <a href=\"#\">mentioned<\u002Fa> as a possibility if McMaster chooses the caretaker route.<\u002Fp>\n\n      <img src=\"125ce908-80fe-4d8a-aeec-053905d5d768\" alt=\"Next Senator from South Carolina? — Kalshi\" style=\"display:block; width:100%; height:auto; border:1px solid #e2e2e2; border-radius:8px; margin:26px 0;\">\n\n      <h2 style=\"font-size:20px; font-weight:700; color:#1a1a1a; margin:26px 0 16px;\">Who will be the Republican nominee in November?<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.7; margin:0 0 22px;\">The filing period runs from July 21 through July 28. The candidate field is likely to include some of the same Republicans being discussed for the temporary appointment, along with several others. If no candidate receives a majority on August 11, the top two finishers will advance to an August 25 runoff.<\u002Fp>\n\n      <img src=\"b9fd3d69-911e-4af7-93ca-9311d6f4db72\" alt=\"SC Republican Senate special primary winner? — Kalshi\" style=\"display:block; width:100%; height:auto; border:1px solid #e2e2e2; border-radius:8px; margin:0 0 26px;\">\n\n      <h2 style=\"font-size:20px; font-weight:700; color:#1a1a1a; margin:0 0 16px;\">Which party or nominee will win the November election?<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.7; margin:0 0 22px;\">The last Democrat to win a Senate election in South Carolina was Fritz Hollings in 1998. In 2020, Graham was reelected to a 4th term by a 54% to 44% margin over Democrat Jaime Harrison.<\u002Fp>\n      <p style=\"font-size:17px; line-height:1.7; margin:0;\">As of Monday morning, prediction markets had shown relatively little reaction to Graham’s death, continuing to give Republicans about an 80% probability of holding the seat in November.<\u002Fp>\n\n    <\u002Fdiv>\n\n    <aside style=\"flex:0 0 300px; width:300px;\">\n      <div style=\"font-size:16px; font-weight:700; color:#1a1a1a; border-bottom:2px solid #c0392b; padding-bottom:8px; margin-bottom:14px;\">Related Content<\u002Fdiv>\n      <div style=\"font-size:14px; margin-bottom:24px;\"><a href=\"#\">News Home<\u002Fa><\u002Fdiv>\n      <div style=\"border:1px solid #eee; border-radius:6px; padding:22px; text-align:center;\">\n        <div style=\"font-size:22px; font-weight:800; color:#1a1a1a; margin-bottom:10px;\">Be the start of something bigger.<\u002Fdiv>\n        <div style=\"font-size:14px; color:#555; margin-bottom:18px;\">One Child. A Whole Community Transformed.<\u002Fdiv>\n        <div style=\"font-size:11px; letter-spacing:0.08em; color:#999; margin-bottom:20px;\">AD · World Vision<\u002Fdiv>\n        <div style=\"display:inline-block; border:2px solid #c0392b; color:#c0392b; font-weight:700; font-size:13px; padding:9px 20px; border-radius:4px;\">LEARN MORE<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      market1: [\n        { name: 'Pamela Evette', pct: '1%' },\n        { name: 'Darline Graham Nordone', pct: '99%' },\n        { name: 'Ralph Norman', pct: '1%' },\n        { name: 'Russell Fry', pct: '1%' },\n        { name: 'Mark Lynch', pct: '1%' }\n      ],\n      market2: [\n        { name: 'Pamela Evette', pct: '9%' },\n        { name: 'Ralph Norman', pct: '15%' },\n        { name: 'Russell Fry', pct: '64%' },\n        { name: 'Mark Lynch', pct: '3%' },\n        { name: 'Nancy Mace', pct: '1%' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
