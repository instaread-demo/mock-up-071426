  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"db125981-8f84-4542-8fb7-d31bd58d9ae1\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  a { color: #4aa8e0; text-decoration: none; }\n  a:hover { color: #7cc3ee; text-decoration: underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div data-screen-label=\"Demo disclaimer (top)\" style=\"position:fixed; top:0; left:0; right:0; height:44px; z-index:9999; background:#141414; border-bottom:2px solid #ffd400; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 16px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:14px;\">⚠ DEMO ONLY — Non-commercial recreation for demonstration purposes only. Not affiliated with 13News Now, Netflix, or Instaread.<\u002Fspan>\n<\u002Fdiv>\n<div data-screen-label=\"Demo disclaimer (bottom-left)\" style=\"position:fixed; bottom:16px; left:16px; z-index:9999; background:#141414; border:2px solid #ffd400; border-radius:8px; padding:8px 14px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; box-shadow:0 4px 14px rgba(0,0,0,0.4);\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:13px;\">DEMO ONLY · For demonstration purposes<\u002Fspan>\n<\u002Fdiv>\n\n<div style=\"padding-top:44px; background:#1b2129; min-height:100vh; font-family:'Segoe UI',Helvetica,Arial,sans-serif; color:#e6e9ec;\" data-screen-label=\"13News Now article\">\n\n  <img src=\"fa4ce19e-b3e0-4627-8f0e-748d3744b29c\" alt=\"13News Now\" style=\"display:block; width:100%; height:auto;\">\n\n  <div style=\"max-width:1160px; margin:0 auto; padding:40px 24px 80px; display:flex; gap:56px; align-items:flex-start;\">\n    <div style=\"flex:1 1 auto; min-width:0; max-width:720px;\">\n\n      <div style=\"font-size:13px; font-weight:800; letter-spacing:0.06em; color:#4aa8e0; margin-bottom:14px;\">VIRGINIA BEACH<\u002Fdiv>\n      <h1 style=\"font-size:40px; line-height:1.14; font-weight:800; color:#ffffff; margin:0 0 20px; letter-spacing:-0.01em;\">Police, businesses respond after large teen gathering by Virginia Beach adventure park<\u002Fh1>\n      <div style=\"width:38px; height:2px; background:#4aa8e0; margin-bottom:18px;\"><\u002Fdiv>\n      <p style=\"font-size:20px; line-height:1.5; color:#c6ccd3; margin:0 0 30px; font-weight:400;\">A large gathering of teenagers outside a Virginia Beach adventure park over the weekend is renewing concerns about meetups organized through social media.<\u002Fp>\n\n      <div style=\"position:relative; margin:0 0 22px;\">\n        <img src=\"264ca5ed-b182-45ac-9789-7ed19a5a0de2\" alt=\"Surge Adventure Park\" style=\"display:block; width:100%; height:auto; border-radius:4px;\">\n        <div style=\"position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:56px; height:56px; border-radius:50%; background:rgba(255,255,255,0.9); display:flex; align-items:center; justify-content:center;\"><span style=\"display:block; width:0; height:0; border-style:solid; border-width:10px 0 10px 16px; border-color:transparent transparent transparent #1b2129; margin-left:4px;\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:30px;\">\n        <div style=\"font-size:13.5px; line-height:1.6; color:#aeb5bd;\">Author: <span style=\"color:#fff; font-weight:600;\">Patrick Gray<\u002Fspan><br>Published: 11:24 PM EDT July 12, 2026<br>Updated: 11:24 PM EDT July 12, 2026<\u002Fdiv>\n        <span style=\"width:30px; height:30px; border-radius:50%; background:#1877f2; color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; flex:0 0 auto;\">f<\u002Fspan>\n      <\u002Fdiv>\n\n      <dc-import name=\"AudioPlayer\" bg=\"#232b34\" accent=\"#0093d0\" hint-size=\"100%,140px\" style=\"margin:0 0 30px; display:block;\"><\u002Fdc-import>\n\n      <p style=\"font-size:18px; line-height:1.75; margin:0 0 22px;\">VIRGINIA BEACH, Va. — After a large gathering of teenagers outside a Virginia Beach adventure park over the weekend, concerns are growing over social media-organized meetups as Chesapeake police prepare for a similar event planned for next week.<\u002Fp>\n      <p style=\"font-size:18px; line-height:1.75; margin:0 0 22px;\">The \"large gathering\" began forming at Surge Adventure Park near Lynnhaven Mall on Saturday night, the business said in a statement to 13News Now. As the crowd continued to grow, staff contacted Virginia Beach police.<\u002Fp>\n      <p style=\"font-size:18px; line-height:1.75; margin:0 0 22px;\">The business said a fight later broke out among members of the gathering before officers arrived. Surge said employees intervened and worked to de-escalate the situation.<\u002Fp>\n      <p style=\"font-size:18px; line-height:1.75; margin:0 0 22px;\">\"Our main priority here at Surge is the safety of our customers and staff,\" the company said in its statement.<\u002Fp>\n      <p style=\"font-size:18px; line-height:1.75; margin:0 0 22px;\">The park said it closely monitored the situation and worked to ensure guests entering the facility were accompanied by someone 21 or older, in accordance with company policy.<\u002Fp>\n      <p style=\"font-size:18px; line-height:1.75; margin:0 0 22px;\">The gathering drew attention from nearby businesses, including Get Air Trampoline Park, located a short distance away.<\u002Fp>\n      <p style=\"font-size:18px; line-height:1.75; margin:0 0 22px;\">Steven Burns, an assistant manager at Get Air, said customers entering the business began talking about activity across the street.<\u002Fp>\n      <p style=\"font-size:18px; line-height:1.75; margin:0 0 22px;\">\"Some customers came in, and they had mentioned that there had been a ‘teen takeover’ at Surge across the street,\" Burns said. \"So I walked outside, saw eight or nine cop cars, and then I started seeing kids start walking towards the park.\"<\u002Fp>\n      <p style=\"font-size:18px; line-height:1.75; margin:0;\">The incident comes as Chesapeake police prepare for what is being promoted on social media as a \"teen takeover\" at Chesapeake Square Mall on Saturday, July 18.<\u002Fp>\n\n    <\u002Fdiv>\n\n    <aside style=\"flex:0 0 300px; width:300px;\">\n      <div style=\"border:1px solid #2a323c; border-radius:4px; height:250px; display:flex; align-items:center; justify-content:center; color:#5a636d; font-size:12px; letter-spacing:0.08em;\">ADVERTISEMENT<\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
