document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"d083c9ae-e14c-441d-b80c-dfa399cd046e\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  a { color: #2f6fb5; text-decoration: none; }\n  a:hover { text-decoration: underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div data-screen-label=\"Demo disclaimer (top)\" style=\"position:fixed; top:0; left:0; right:0; height:44px; z-index:9999; background:#141414; border-bottom:2px solid #ffd400; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 16px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:14px;\">⚠ DEMO ONLY — Non-commercial recreation for demonstration purposes only. Not affiliated with RxList / WebMD, Netflix, or Instaread.<\u002Fspan>\n<\u002Fdiv>\n<div data-screen-label=\"Demo disclaimer (bottom-left)\" style=\"position:fixed; bottom:16px; left:16px; z-index:9999; background:#141414; border:2px solid #ffd400; border-radius:8px; padding:8px 14px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; box-shadow:0 4px 14px rgba(0,0,0,0.4);\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:13px;\">DEMO ONLY · For demonstration purposes<\u002Fspan>\n<\u002Fdiv>\n\n<div style=\"padding-top:44px; background:#ffffff; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; color:#333;\" data-screen-label=\"RxList Trimbow article\">\n\n  <img src=\"38ed38d1-1053-4857-b63c-de1e180d24c2\" alt=\"RxList\" style=\"display:block; width:100%; height:auto; border-bottom:1px solid #eee;\">\n\n  <div style=\"max-width:1180px; margin:0 auto; padding:26px 24px 80px; display:flex; gap:48px; align-items:flex-start;\">\n    <div style=\"flex:1 1 auto; min-width:0; max-width:760px;\">\n\n      <div style=\"margin-bottom:22px;\"><a href=\"#\" style=\"font-size:15px;\">Drug Index<\u002Fa><\u002Fdiv>\n\n      <h1 style=\"font-size:44px; font-weight:800; color:#1a1a1a; margin:0 0 16px; letter-spacing:0.01em;\">TRIMBOW<\u002Fh1>\n\n      <div style=\"font-size:15px; line-height:1.7; color:#444; margin-bottom:6px;\">Generic Name: <a href=\"#\">beclomethasone, formoterol, and glycopyrrolate<\u002Fa><\u002Fdiv>\n      <div style=\"font-size:15px; line-height:1.7; color:#444; margin-bottom:6px;\">Brand Name: Trimbow<\u002Fdiv>\n      <div style=\"font-size:15px; line-height:1.7; color:#444; margin-bottom:6px;\">Drug Class: <a href=\"#\">Respiratory Inhalant Combos<\u002Fa>, <a href=\"#\">Corticosteroids, Inhalants<\u002Fa>, <a href=\"#\">Beta2 Agonists<\u002Fa>, <a href=\"#\">Anticholinergics, Respiratory<\u002Fa><\u002Fdiv>\n      <div style=\"font-size:15px; line-height:1.7; color:#666; margin-bottom:24px;\">Last updated on RxList: 5/29/2026<\u002Fdiv>\n\n      <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#2f6fb5\" hint-size=\"100%,140px\" style=\"margin:0 0 26px; display:block;\"><\u002Fdc-import>\n\n      <div style=\"border:1px solid #bcd6ef; border-radius:6px; margin-bottom:26px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; padding:16px 20px;\">\n          <span style=\"width:4px; height:24px; background:#2f6fb5; display:inline-block;\"><\u002Fspan>\n          <span style=\"font-size:22px; font-weight:800; color:#1a1a1a;\">Drug Summary<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid #dde9f5; padding:20px; min-height:28px;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#eef4fb; border-radius:6px; padding:20px 22px; margin-bottom:30px;\">\n        <div style=\"font-size:22px; font-weight:800; color:#1a1a1a; margin-bottom:12px;\">FDA Drug Information<\u002Fdiv>\n        <div style=\"border-top:1px dashed #9db8d4; padding-top:14px; font-size:15px; line-height:2; color:#2f6fb5;\">\n          <a href=\"#\">Drug Description<\u002Fa> &nbsp;|&nbsp; <a href=\"#\">Indications &amp; Dosage<\u002Fa> &nbsp;|&nbsp; <a href=\"#\">Side Effects<\u002Fa> &nbsp;|&nbsp; <a href=\"#\">Drug Interactions<\u002Fa> &nbsp;|&nbsp; <a href=\"#\">Warnings &amp; Precautions<\u002Fa> &nbsp;|&nbsp; <a href=\"#\">Overdose &amp; Contraindications<\u002Fa> &nbsp;|&nbsp; <a href=\"#\">Clinical Pharmacology<\u002Fa> &nbsp;|&nbsp; <a href=\"#\">Medication Guide<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:18px;\">\n        <span style=\"width:4px; height:24px; background:#2f6fb5; display:inline-block;\"><\u002Fspan>\n        <span style=\"font-size:23px; font-weight:800; color:#1a1a1a;\">Description for Trimbow<\u002Fspan>\n      <\u002Fdiv>\n\n      <p style=\"font-size:16px; line-height:1.7; margin:0 0 18px;\">TRIMBOW (beclomethasone dipropionate, formoterol fumarate and glycopyrrolate) Inhalation Aerosol is a pressurized metered-dose inhaler that delivers a combination of beclomethasone dipropionate [an inhaled corticosteroid (ICS)], formoterol fumarate [an inhaled long-acting beta<sub>2<\u002Fsub>-adrenergic agonist (a LABA)] and glycopyrrolate (an anticholinergic) for oral inhalation.<\u002Fp>\n\n      <p style=\"font-size:16px; line-height:1.7; margin:0 0 18px;\">Beclomethasone dipropionate, an inhaled corticosteroid [ICS], has the chemical name [2-[(8S,9R,10S,11S,13S,14S,16S,17R)-9-chloro-11-hydroxy-10,13,16-trimethyl-3-oxo-17-propanoyloxy-6,7,8,11,12,14,15,16-octahydrocyclopenta[a]phenanthren-17-yl]-2-oxoethyl] propanoate. Beclomethasone dipropionate is a white to creamy white, odorless powder, insoluble in water, freely soluble in acetone, and sparingly soluble in alcohol, with a molecular weight of 521.04218 g/mol, and the molecular formula is C<sub>28<\u002Fsub>H<sub>37<\u002Fsub>ClO<sub>7<\u002Fsub>.<\u002Fp>\n\n      <p style=\"font-size:16px; line-height:1.7; margin:0 0 10px;\">The structural formula is as follows:<\u002Fp>\n      <img src=\"4e5f86af-4089-430d-8159-f14fe357688f\" alt=\"Beclomethasone dipropionate structural formula\" style=\"display:block; max-width:380px; width:100%; height:auto; margin:0 auto 26px;\">\n\n      <p style=\"font-size:16px; line-height:1.7; margin:0 0 18px;\">Formoterol fumarate, a long-acting β2 agonist has the chemical name (E)-but-2-enedioic acid; <em>N<\u002Fem>-[2-hydroxy-5-[(1<em>R<\u002Fem>)-1-hydroxy-2-[[(1<em>R<\u002Fem>)-2-(4-methoxyphenyl)-1-methylethyl]amino]ethyl]phenyl]-formamide dihydrate. Formoterol fumarate is a powder that is slightly soluble in water. Formoterol fumarate has a molecular weight of 840.91 g/mol, and the molecular formula is C<sub>42<\u002Fsub>H<sub>52<\u002Fsub>N<sub>4<\u002Fsub>O<sub>12<\u002Fsub>.<\u002Fp>\n\n      <p style=\"font-size:16px; line-height:1.7; margin:0 0 10px;\">The structural formula is as follows:<\u002Fp>\n      <img src=\"c624b448-60e8-49fe-a36f-e96c49ea0542\" alt=\"Formoterol fumarate structural formula\" style=\"display:block; max-width:560px; width:100%; height:auto; margin:0 auto 26px;\">\n\n      <p style=\"font-size:16px; line-height:1.7; margin:0 0 18px;\">Formoterol fumarate contains two chiral centers and consists of a single enantiomeric pair (a racemate of R,R and S,S) .<\u002Fp>\n\n      <p style=\"font-size:16px; line-height:1.7; margin:0 0 18px;\">Glycopyrrolate is a quarternary ammonium bromide salt with the following chemical name: [<em>RS<\u002Fem>]-3-[(<em>SR<\u002Fem>)-(cyclopentylhydroxyphenylacetyl)oxy]-1,1-dimethyl-Pyrrolidinium bromide. Two asymmetric atoms of carbon are present in the molecule: Glycopyrronium bromide is represented by the (R,S)-(S,R) racemic pair of enantiomers, corresponding to the threo diastereoisomeric structure. Glycopyrrolate is a powder that is freely soluble in water. Glycopyrrolate has a molecular weight of 398.33 g/mol, and the molecular formula is C<sub>19<\u002Fsub>H<sub>28<\u002Fsub>BrNO<sub>3<\u002Fsub>.<\u002Fp>\n\n      <p style=\"font-size:16px; line-height:1.7; margin:0 0 10px;\">The structural formula is as follows:<\u002Fp>\n      <img src=\"73ba68c2-5ba1-42c2-80cf-3f7320ddda3b\" alt=\"Glycopyrrolate structural formula\" style=\"display:block; max-width:420px; width:100%; height:auto; margin:0 auto 26px;\">\n\n      <p style=\"font-size:16px; line-height:1.7; margin:0 0 18px;\">Glycopyrrolate contains two chiral centers and is a racemate of a 1;1 mixture of the R,S and S,R diastereomers. The active moiety, glycopyrronium, is the positively charged ion of glycopyrrolate.<\u002Fp>\n\n      <p style=\"font-size:16px; line-height:1.7; margin:0 0 18px;\">TRIMBOW 86 mcg/4.9 mcg/10.6 mcg and TRIMBOW 172 mcg/4.9 mcg/10.6 mcg are formulated as a hydrofluoroalkane (HFA 134a) propelled pressurized, metered-dose inhalers, each containing 120 actuations. The canister is supplied with a grey plastic actuator with an integrated dose counter mechanism and mouthpiece, and a red cap (TRIMBOW 86 mcg/4.9 mcg/10.6 mcg) or a green cap (TRIMBOW 172 mcg/4.9 mcg/10.6 mcg). As a solution, TRIMBOW does not need to be shaken before use. TRIMBOW should be “primed” by actuating 2 times prior to using the first dose from a new canister. If the inhaler has not been used for 30 days or longer, re-prime the inhaler <em>[see How Supplied/Storage and Handling]<\u002Fem>. After priming, each actuation meters 100 or 200 mcg of beclomethasone dipropionate, 6.0 mcg of formoterol fumarate (equivalent to 5.7 mcg of formoterol fumarate anhydrous), and 12.5 mcg of glycopyrrolate (equivalent to 10 mcg of glycopyrronium) in 73.8 mg of solution from the valve and delivers 86 or 172 mcg of beclomethasone dipropionate, 4.9 mcg of formoterol fumarate (equivalent to 4.2 mcg of formoterol fumarate anhydrous), and 10.6 mcg of glycopyrrolate (equivalent to 8.5 mcg of glycopyrronium) from the actuator. The actual amount of drug delivered to the lung may depend on patient factors, such as coordination of the device (metered dose inhaler [MDI]) actuation with the inhalation maneuver, inspiratory flow and peak inspiratory flow through the delivery system, which may vary in patients with asthma and other pulmonary diseases and conditions. Avoid spraying in the eyes or face while…<\u002Fp>\n\n      <p style=\"font-size:16px; line-height:1.7; margin:0;\">TRIMBOW contains dehydrated alcohol (18% v/v), HFA 134a, and hydrochloric acid as excipients in the formulation.<\u002Fp>\n\n    <\u002Fdiv>\n\n    <aside style=\"flex:0 0 300px; width:300px;\">\n      <div style=\"border-top:2px solid #e6e6e6;\">\n        <div style=\"display:flex; align-items:center; gap:14px; padding:16px 4px; border-bottom:1px solid #eee;\">\n          <div style=\"flex:1 1 auto;\"><a href=\"#\" style=\"font-weight:700; font-size:16px;\">Pill Identifier Tool<\u002Fa><div style=\"font-size:13px; color:#777; margin-top:3px;\">Quick, Easy, Pill Identification<\u002Fdiv><\u002Fdiv>\n          <span style=\"width:30px; height:30px; border-radius:50%; background:#eaf2fb; display:flex; align-items:center; justify-content:center; color:#2f6fb5; font-size:15px;\">⚲<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:14px; padding:16px 4px; border-bottom:1px solid #eee;\">\n          <div style=\"flex:1 1 auto;\"><a href=\"#\" style=\"font-weight:700; font-size:16px;\">Drug Interaction Tool<\u002Fa><div style=\"font-size:13px; color:#777; margin-top:3px;\">Check Potential Drug Interactions<\u002Fdiv><\u002Fdiv>\n          <span style=\"width:30px; height:30px; border-radius:50%; background:#eaf2fb; display:flex; align-items:center; justify-content:center; color:#2f6fb5; font-size:15px;\">◉<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:14px; padding:16px 4px; border-bottom:1px solid #eee;\">\n          <div style=\"flex:1 1 auto;\"><a href=\"#\" style=\"font-weight:700; font-size:16px;\">Pharmacy Locator Tool<\u002Fa><div style=\"font-size:13px; color:#777; margin-top:3px;\">Including 24 Hour, Pharmacies<\u002Fdiv><\u002Fdiv>\n          <span style=\"width:30px; height:30px; border-radius:50%; background:#eaf2fb; display:flex; align-items:center; justify-content:center; color:#2f6fb5; font-size:15px;\">◎<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:26px; border:1px solid #eee; aspect-ratio:1/1; display:flex; align-items:flex-end; justify-content:center; padding-bottom:8px; color:#bbb; font-size:10px; letter-spacing:2px;\">ADVERTISEMENT<\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
