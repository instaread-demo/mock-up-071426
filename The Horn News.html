  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"2e5f9a79-7b59-4f42-a07b-635ba04f86cc\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  a { color: #1a3a8f; text-decoration: none; }\n  a:hover { text-decoration: underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div data-screen-label=\"Demo disclaimer (top)\" style=\"position:fixed; top:0; left:0; right:0; height:44px; z-index:9999; background:#141414; border-bottom:2px solid #ffd400; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 16px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:14px;\">⚠ DEMO ONLY — Non-commercial recreation for demonstration purposes only. Not affiliated with The Horn News or Instaread.<\u002Fspan>\n<\u002Fdiv>\n<div data-screen-label=\"Demo disclaimer (bottom-left)\" style=\"position:fixed; bottom:16px; left:16px; z-index:9999; background:#141414; border:2px solid #ffd400; border-radius:8px; padding:8px 14px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; box-shadow:0 4px 14px rgba(0,0,0,0.4);\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:13px;\">DEMO ONLY · For demonstration purposes<\u002Fspan>\n<\u002Fdiv>\n\n<div style=\"padding-top:44px; background:#ffffff; min-height:100vh; font-family:Arial,Helvetica,sans-serif; color:#222;\" data-screen-label=\"The Horn News article\">\n\n  <img src=\"f7597aba-da5d-4705-9313-5de3c5e7ff0d\" alt=\"The Horn News\" style=\"display:block; width:100%; height:auto;\">\n\n  <div style=\"max-width:1180px; margin:0 auto; padding:30px 24px 80px; display:flex; gap:44px; align-items:flex-start;\">\n    <div style=\"flex:1 1 auto; min-width:0; max-width:760px;\">\n\n      <div style=\"display:flex; gap:24px; align-items:flex-start; margin-bottom:18px;\">\n        <img src=\"2e4a2558-1003-4f39-8291-de190747c83c\" alt=\"Sen. Lindsey Graham\" style=\"width:300px; height:auto; flex:0 0 auto;\">\n        <h1 style=\"font-size:44px; font-weight:800; line-height:1.05; margin:0; color:#2a2a2a;\">Donald Trump names late Sen. Lindsey Graham’s successor?<\u002Fh1>\n      <\u002Fdiv>\n\n      <div style=\"font-size:13px; color:#555; margin-bottom:16px;\">JULY 13, 2026 &nbsp;&nbsp; By: <a href=\"#\">Stephen Dietrich<\u002Fa><\u002Fdiv>\n\n      <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#242e66\" hint-size=\"100%,140px\" style=\"margin:0 0 30px; display:block;\"><\u002Fdc-import>\n\n      <div style=\"display:flex; gap:8px; margin-bottom:26px; flex-wrap:wrap;\">\n        <span style=\"background:#3b5998; color:#fff; font-weight:700; font-size:13px; padding:10px 26px; display:inline-flex; align-items:center; gap:8px;\"> &nbsp;FACEBOOK<\u002Fspan>\n        <span style=\"background:#0077b5; color:#fff; font-weight:700; font-size:13px; padding:10px 26px; display:inline-flex; align-items:center; gap:8px;\">in &nbsp;LINKEDIN<\u002Fspan>\n        <span style=\"background:#111; color:#fff; font-weight:700; font-size:13px; padding:10px 26px; display:inline-flex; align-items:center; gap:8px;\">𝕏 &nbsp;POST<\u002Fspan>\n        <span style=\"background:#8a949e; color:#fff; font-size:15px; padding:10px 18px;\">✉<\u002Fspan>\n        <span style=\"background:#8a949e; color:#fff; font-size:15px; padding:10px 18px;\">🖨<\u002Fspan>\n      <\u002Fdiv>\n\n      <p style=\"font-family:Georgia,serif; font-size:19px; line-height:1.65; margin:0 0 22px; font-style:italic; color:#333;\"><strong>EDITORS NOTE:<\u002Fstrong> Since the publication of this article, President Donald Trump endorsed the late Sen. Lindsey Graham’s sister in a statement on Truth Social. He wrote, “I recommended, to Governor Henry McMaster, Lindsey Graham’s wonderful sister, Darline, to serve as interim Senator from the Great State of South Carolina. This would be a fabulous tribute to Lindsey, who loved her dearly!<\u002Fp>\n\n      <p style=\"font-family:Georgia,serif; font-size:19px; line-height:1.65; margin:0 0 22px;\">President Donald Trump already has a Republican in mind to succeed the late Sen. Lindsey Graham in South Carolina. He’s not telling anyone who it is.<\u002Fp>\n\n      <p style=\"font-family:Georgia,serif; font-size:19px; line-height:1.65; margin:0 0 26px;\">“I have somebody that I think would be great,” Trump said Sunday. “But I don’t want to say it now because it’s just, it’s too soon with Lindsey. I don’t wanna even talk about anybody, but I do have somebody that I think is really good.”<\u002Fp>\n\n      <p style=\"font-size:18px; line-height:1.5; margin:0 0 26px;\"><a href=\"#\" style=\"font-weight:700; text-decoration:underline;\">“Fed Proof” Your Bank Account with THESE 4 Simple Steps<\u002Fa> <span style=\"color:#666;\">[Sponsored by Weiss Ratings, LLC]<\u002Fspan><\u002Fp>\n\n      <p style=\"font-family:Georgia,serif; font-size:19px; line-height:1.65; margin:0 0 22px;\">The scramble to replace the most powerful senator in South Carolina’s modern history has already begun.<\u002Fp>\n\n      <p style=\"font-family:Georgia,serif; font-size:19px; line-height:1.65; margin:0 0 22px;\">Graham died suddenly Saturday evening of heart failure at his Capitol Hill home. He had just returned from meeting with Ukrainian President Volodymyr Zelenskyy in Kyiv the day before. He was seeking a fifth Senate term and had early won the Republican primary just a month ago.<\u002Fp>\n\n      <p style=\"font-family:Georgia,serif; font-size:19px; line-height:1.65; margin:0;\">South Carolina law now kicks in fast. Gov. Henry McMaster, a close Trump ally the president called “a great governor” Sunday, said “he’s going to do the right thing” and appoint a temporary replacement to serve the remainder of Graham’s term through January 2027.<\u002Fp>\n\n    <\u002Fdiv>\n\n    <aside style=\"flex:0 0 320px; width:320px;\">\n      <div style=\"border:1px solid #d9d9d9; margin-bottom:34px;\">\n        <div style=\"border-bottom:1px solid #d9d9d9; padding:14px 18px; font-weight:800; font-size:17px; color:#d62027; letter-spacing:0.03em;\">POPULAR<\u002Fdiv>\n        <div style=\"padding:14px 18px;\">\n          <sc-for list=\"{{ popular }}\" as=\"p\" hint-placeholder-count=\"9\">\n            <div style=\"display:flex; gap:10px; padding:9px 0; border-bottom:1px solid #eee;\">\n              <span style=\"color:#d62027; font-size:20px; line-height:1;\">•<\u002Fspan>\n              <span style=\"font-size:15px; font-weight:700; color:#2a3a6b; line-height:1.3;\">{{ p }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div style=\"display:flex; justify-content:space-between; align-items:baseline; border-bottom:2px solid #222; padding-bottom:6px; margin-bottom:14px;\">\n          <span style=\"font-weight:800; font-size:18px; color:#222;\">Trending<\u002Fspan>\n          <span style=\"font-size:12px; color:#999;\">Promoted Links<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width:100%; height:200px; background:linear-gradient(160deg,#cfe4f5,#f5d7e2 55%,#e7c8d8); border-radius:2px; display:flex; align-items:flex-end; padding:12px; color:#5a6b7a; font-size:12px;\">🌸 🌴<\u002Fdiv>\n        <div style=\"font-weight:800; font-size:18px; color:#222; margin-top:12px;\">Fly now to North East Asia<\u002Fdiv>\n        <div style=\"font-size:14px; color:#444; line-height:1.4; margin-top:6px;\">Experience Cathay Pacific’s award-winning cabins and service* when you fly to multiple …<\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; align-items:center; margin-top:10px;\">\n          <span style=\"font-size:12px; color:#888;\">Cathay Pacific<\u002Fspan>\n          <span style=\"border:1px solid #bbb; border-radius:3px; padding:5px 12px; font-size:12px; color:#333;\">Book Now
