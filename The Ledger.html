  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

erif; font-size:12px; font-weight:800; letter-spacing:0.08em; color:#555; margin-bottom:12px;\">HEALTHCARE<\u002Fdiv>\n      <h1 style=\"font-family:Arial,Helvetica,sans-serif; font-size:40px; font-weight:800; line-height:1.12; margin:0 0 22px; color:#111;\">Lakeland Regional Health earns Level I trauma center designation<\u002Fh1>\n\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\">\n        <div style=\"width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#3a7d44,#8bc34a); flex:0 0 auto;\"><\u002Fdiv>\n        <div style=\"font-family:Arial,sans-serif;\">\n          <div style=\"font-size:15px;\"><a href=\"#\" style=\"font-weight:700;\">Sara-Megan Walsh<\u002Fa><\u002Fdiv>\n          <div style=\"font-size:13px; color:#666;\">Lakeland Ledger<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:Arial,sans-serif; font-size:13px; color:#666; margin-bottom:16px;\">July 9, 2026, 5:06 a.m. ET<\u002Fdiv>\n\n      <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#1683c7\" hint-size=\"100%,140px\" style=\"margin:0 0 26px; display:block;\"><\u002Fdc-import>\n\n      <div style=\"display:flex; gap:14px; margin-bottom:26px; color:#444; font-size:17px;\">\n        <span style=\"width:34px; height:34px; border-radius:50%; background:#1877f2; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:15px;\">f<\u002Fspan>\n        <span style=\"width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center;\">𝕏<\u002Fspan>\n        <span style=\"width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center;\">✉<\u002Fspan>\n        <span style=\"width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center;\">➦<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"text-align:center; font-family:Arial,sans-serif; font-size:11px; color:#999; margin-bottom:6px;\">Advertisement<\u002Fdiv>\n      <div style=\"position:relative; background:#000; margin-bottom:8px;\">\n        <img src=\"e36f1fc5-380e-42b8-bfed-665d62936bb1\" alt=\"Polk State College health students practice their emergency skills\" style=\"display:block; width:100%; height:auto;\">\n      <\u002Fdiv>\n      <div style=\"font-family:Arial,sans-serif; margin-bottom:34px;\">\n        <div style=\"font-size:15px; font-weight:700; color:#111; margin-bottom:4px;\">Polk State College health students practice their emergency skills<\u002Fdiv>\n        <div style=\"font-size:13px; color:#666; line-height:1.5;\">Polk State College officials celebrated graduates’ success on licensing exams for medical fields, and students showed off their skills in an emergency.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0 0 24px;\">Lakeland Regional Health has been designated as Level I trauma center by Florida Department of Health, the highest possible tier for trauma care.<\u002Fp>\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0 0 30px;\">“The most significant impact of being a Level I Trauma Center is the ability to keep families together during a traumatic event,” said Dr. Timothy Regan, president of Lakeland Regional Health Medical Center and LRH’s chief medical officer. “We are equipped to provide advanced, multidisciplinary trauma care for patients of all ages, 24/7, ensuring comprehensive and timely support when it matters most. Families will no longer need to leave the county to be near their loved ones during recovery.”<\u002Fp>\n\n      <div style=\"background:#eef0f2; border-radius:4px; height:300px; display:flex; align-items:center; justify-content:center; color:#9aa0a8; font-family:Arial,sans-serif; font-size:34px; margin-bottom:8px;\">🏥<\u002Fdiv>\n      <div style=\"font-family:Arial,sans-serif; font-size:13px; color:#666; line-height:1.5; margin-bottom:34px;\">Lakeland Regional Health Medical Center has been upgraded to a Level I trauma center. <span style=\"font-style:italic;\">Michael Wilson, Ledger Correspondent<\u002Fspan><\u002Fdiv>\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0 0 24px;\">As a Level I trauma center, the <a href=\"#\">Department of Health’s map of designated trauma centers shows<\u002Fa> Lakeland Regional’s service area will extend south beyond Polk to include patients in Hardee and Highlands counties.<\u002Fp>\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0 0 24px;\">Lakeland Regional Health Medical Center has served Polk County as a Level II trauma center since 1997. It has served more than 4,400 trauma patients a year.<\u002Fp>\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0;\">Patients requiring a higher level of care previously had to be airlifted or rushed via ambulance to hospitals in Orlando or Tampa.<\u002Fp>\n\n    <\u002Fdiv>\n\n    <aside style=\"flex:0 0 340px; width:340px; font-family:Arial,sans-serif;\">\n      <div style=\"background:#f2f2f2; height:600px; display:flex; align-items:center; justify-content:center; color:#bbb; font-size:12px; margin-bottom:30px;\">Advertisement<\u002Fdiv>\n\n      <div style=\"display:flex; align-items:center; gap:10px; border-bottom:2px solid #111; padding-bottom:8px; margin-bottom:16px;\">\n        <span style=\"font-size:20px; font-weight:800; color:#111;\">More Stories<\u002Fspan>\n        <span style=\"flex:1; height:1px; background:#111;\"><\u002Fspan>\n      <\u002Fdiv>\n\n      <sc-for list=\"{{ more }}\" as=\"m\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex; gap:14px; padding:12px 0; border-bottom:1px solid #eee;\">\n          <div style=\"width:110px; height:72px; flex:0 0 auto; border-radius:2px; background:{{ m.bg }};\"><\u002Fdiv>\n          <div>\n            <div style=\"font-size:15px; font-weight:700; color:#111; line-height:1.3;\">{{ m.title }}<\u002Fdiv>\n            <div style=\"font-size:11px; font-weight:700; letter-spacing:0.05em; color:#999; margin-top:6px;\">{{ m.tag }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"border:2px solid #1a73e8; border-radius:4px; padding:16px; margin-top:24px; font-family:Georgia,serif; font-style:italic; font-size:15px; color:#333; line-height:1.5;\">We’re always working to improve your experience. <a href=\"#\" style=\"font-weight:700;\">Let us know what you think.<\u002Fa><\u002Fdiv>\n\n      <div style=\"background:#f2f2f2; height:280px; display:flex; align-items:center; justify-content:center; color:#bbb; font-size:12px; margin-top:24px;\">Advertisement<\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      nav: ['[ News ]','Sports','Entertainment','Opinion','Real Estate','Advertise','Obituaries','eNewspaper','Legals'],\n      more: [\n        {title:'Update: 2-year-old boy fatally shot at Florida home by 4-year-old sibling', tag:'NEWS', bg:'linear-gradient(135deg,#3a4a6b,#7a3b52)'},\n        {title:'Sergeant shoots suspect who rammed him with truck, Polk sheriff says', tag:'NEWS', bg:'linear-gradient(135deg,#4a4a4a,#2a2a2a)'},\n        {title:'10 Foods You Cannot Eat when You\\u2019re Over 50', tag:'Travel Sent | Sponsored Links', bg:'linear-gradient(135deg,#e8c06a,#f2e0a8)'}\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
