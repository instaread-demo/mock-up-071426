document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"d9a6348d-ed11-4efd-a756-3dc9326ee14b\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  a { color: #4a9fe0; text-decoration: none; }\n  a:hover { color: #2d7bb8; text-decoration: underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div data-screen-label=\"Demo disclaimer (top)\" style=\"position:fixed; top:0; left:0; right:0; height:44px; z-index:9999; background:#141414; border-bottom:2px solid #ffd400; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 16px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:14px;\">⚠ DEMO ONLY — Non-commercial recreation for demonstration purposes only. Not affiliated with eMedicineHealth, Netflix, or Instaread.<\u002Fspan>\n<\u002Fdiv>\n<div data-screen-label=\"Demo disclaimer (bottom-left)\" style=\"position:fixed; bottom:16px; left:16px; z-index:9999; background:#141414; border:2px solid #ffd400; border-radius:8px; padding:8px 14px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; box-shadow:0 4px 14px rgba(0,0,0,0.4);\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:13px;\">DEMO ONLY · For demonstration purposes<\u002Fspan>\n<\u002Fdiv>\n\n<div style=\"padding-top:44px; background:#ffffff; min-height:100vh; font-family:'Segoe UI',Helvetica,Arial,sans-serif; color:#333;\" data-screen-label=\"eMedicineHealth article\">\n\n  <img src=\"241ed05f-96a4-457a-85f0-6f6a1a16b78f\" alt=\"emedicinehealth\" style=\"display:block; width:100%; height:auto;\">\n\n  <div style=\"text-align:center; padding:22px 0;\">\n    <div style=\"max-width:800px; margin:0 auto; height:110px; border:1px solid #eee; display:flex; align-items:center; justify-content:center; color:#bbb; font-size:11px; letter-spacing:0.1em; writing-mode:vertical-rl;\">ADVERTISEMENT<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1200px; margin:0 auto; padding:10px 24px 80px; display:flex; gap:48px; align-items:flex-start;\">\n    <div style=\"flex:1 1 auto; min-width:0; max-width:780px;\">\n\n      <div style=\"font-size:15px; margin-bottom:22px;\"><a href=\"#\">Health Topics<\u002Fa> / <a href=\"#\">Brain &amp; Nervous System Center<\u002Fa><\u002Fdiv>\n\n      <h1 style=\"font-size:44px; line-height:1.12; font-weight:800; color:#1a1a1a; margin:0 0 20px; letter-spacing:-0.01em;\">Why Do I Get Motion Sick So Easily?<\u002Fh1>\n      <div style=\"font-size:15px; color:#555; margin-bottom:26px;\">Medical Editor: <a href=\"#\">John P. Cunha, DO, FACOEP<\u002Fa><\u002Fdiv>\n\n      <div style=\"display:flex; gap:20px; font-size:15px; font-weight:600; margin-bottom:14px;\"><a href=\"#\">12 Symptoms<\u002Fa> <span style=\"color:#ccc;\">|<\u002Fspan> <a href=\"#\">How to Cure<\u002Fa><\u002Fdiv>\n      <div style=\"height:6px; background:#e8e8e8; border-radius:3px; margin-bottom:28px;\"><\u002Fdiv>\n\n      <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#0e76bc\" hint-size=\"100%,140px\" style=\"margin:0 0 30px; display:block;\"><\u002Fdc-import>\n\n      <div style=\"display:flex; gap:28px; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap;\">\n        <div style=\"flex:1 1 300px; min-width:280px;\">\n          <p style=\"font-size:17px; line-height:1.7; margin:0 0 20px;\"><a href=\"#\">Motion sickness<\u002Fa> is a type of <a href=\"#\">dizziness<\u002Fa> that occurs in response to real or perceived motion, and can cause gastrointestinal and <a href=\"#\">nervous system<\u002Fa> symptoms.<\u002Fp>\n          <p style=\"font-size:17px; line-height:1.7; margin:0 0 20px;\">Motion sickness results from an imbalance between what you see and what you feel. For example, a car moves forward while your body remains still. This imbalance causes the symptoms of motion sickness.<\u002Fp>\n          <p style=\"font-size:17px; line-height:1.7; font-weight:700; color:#1a1a1a; margin:0;\">Some people get motion sickness more easily than others. Factors that can predispose you to motion sickness include:<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex:0 0 360px; max-width:360px;\">\n          <img src=\"ec749f90-8e82-4cf4-ad0b-dc4de2b63bf3\" alt=\"Man experiencing motion sickness\" style=\"display:block; width:100%; height:auto;\">\n          <div style=\"font-size:13.5px; line-height:1.5; color:#999; margin-top:8px;\">Risk factors for motion sickness include being a child, taking certain medications, sinus congestion, sinus infection, ear infection, recent concussion, migraines, pregnancy, and being female.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <ul style=\"font-size:17px; line-height:1.7; margin:0; padding-left:22px;\">\n        <li style=\"margin-bottom:10px;\">Age\n          <ul style=\"margin:8px 0 0; padding-left:22px; color:#444;\">\n            <li style=\"margin-bottom:6px;\">More common in children than adults<\u002Fli>\n            <li>Most children will grow out of it<\u002Fli>\n          <\u002Ful>\n        <\u002Fli>\n        <li style=\"margin-bottom:10px;\">Side effects of certain medications\n          <ul style=\"margin:8px 0 0; padding-left:22px; color:#444;\">\n            <li style=\"margin-bottom:6px;\">Certain <a href=\"#\">antibiotics<\u002Fa><\u002Fli>\n            <li style=\"margin-bottom:6px;\">Nonsteroidal anti-inflammatory drugs (NSAIDs) such as ibuprofen (Advil, Motrin) or naproxen (Aleve)<\u002Fli>\n            <li><a href=\"#\">Birth control<\u002Fa> pills<\u002Fli>\n          <\u002Ful>\n        <\u002Fli>\n        <li style=\"margin-bottom:10px;\">Medical conditions\n          <ul style=\"margin:8px 0 0; padding-left:22px; color:#444;\">\n            <li style=\"margin-bottom:6px;\">Sinus congestion<\u002Fli>\n            <li style=\"margin-bottom:6px;\"><a href=\"#\">Sinus infection<\u002Fa><\u002Fli>\n            <li style=\"margin-bottom:6px;\"><a href=\"#\">Ear infection<\u002Fa><\u002Fli>\n            <li style=\"margin-bottom:6px;\">Recent <a href=\"#\">concussion<\u002Fa><\u002Fli>\n            <li>Migraines<\u002Fli>\n          <\u002Ful>\n        <\u002Fli>\n        <li style=\"margin-bottom:10px;\"><a href=\"#\">Pregnancy<\u002Fa>\n          <ul style=\"margin:8px 0 0; padding-left:22px; color:#444;\">\n            <li>People who are <a href=\"#\">pregnant<\u002Fa>, especially those who have <a href=\"#\">morning sickness<\u002Fa>, are more likely to develop motion sickness<\u002Fli>\n          <\u002Ful>\n        <\u002Fli>\n        <li>Being female\n          <ul style=\"margin:8px 0 0; padding-left:22px; color:#444;\">\n            <li style=\"margin-bottom:6px;\">Women are more likely than men to develop motion sickness<\u002Fli>\n            <li>A spike in the levels of the female hormone estrogen may cause or increase a person’s susceptibility to <a href=\"#\">nausea<\u002Fa><\u002Fli>\n          <\u002Ful>\n        <\u002Fli>\n      <\u002Ful>\n\n    <\u002Fdiv>\n\n    <aside style=\"flex:0 0 300px; width:300px;\">\n      <div style=\"border:1px solid #eee; height:260px; display:flex; align-items:center; justify-content:center; color:#bbb; font-size:11px; letter-spacing:0.1em;\">ADVERTISEMENT<\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
