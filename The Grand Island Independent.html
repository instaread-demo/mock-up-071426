document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"4989c13a-d50b-4c51-adf3-88706163ae54\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  a { color: #4a90e2; text-decoration: none; }\n  a:hover { text-decoration: underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div data-screen-label=\"Demo disclaimer (top)\" style=\"position:fixed; top:0; left:0; right:0; height:44px; z-index:9999; background:#141414; border-bottom:2px solid #ffd400; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 16px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:14px;\">⚠ DEMO ONLY — Non-commercial recreation for demonstration purposes only. Not affiliated with The Grand Island Independent or Instaread.<\u002Fspan>\n<\u002Fdiv>\n<div data-screen-label=\"Demo disclaimer (bottom-left)\" style=\"position:fixed; bottom:16px; left:16px; z-index:9999; background:#141414; border:2px solid #ffd400; border-radius:8px; padding:8px 14px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; box-shadow:0 4px 14px rgba(0,0,0,0.4);\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:13px;\">DEMO ONLY · For demonstration purposes<\u002Fspan>\n<\u002Fdiv>\n\n<div style=\"padding-top:44px; background:#0f1216; min-height:100vh; font-family:Georgia,'Times New Roman',serif; color:#e8eaed;\" data-screen-label=\"Grand Island Independent article\">\n\n  <img src=\"954f41c9-c7d3-4816-9c59-63039044edc0\" alt=\"The Grand Island Independent\" style=\"display:block; width:100%; height:auto;\">\n\n  <div style=\"max-width:1160px; margin:0 auto; padding:26px 26px 90px;\">\n\n    <div style=\"font-family:Arial,sans-serif; font-size:12px; font-weight:700; letter-spacing:0.08em; color:#8a8f96; margin-bottom:10px;\">ALERT · TOP STORY · TOPICAL<\u002Fdiv>\n\n    <h1 style=\"font-size:52px; font-weight:700; line-height:1.08; margin:0 0 18px; color:#fff;\">Driver injured in 2-vehicle collision in Merrick County<\u002Fh1>\n\n    <div style=\"font-family:Arial,sans-serif; font-size:15px; color:#aeb3ba; margin-bottom:28px;\"><a href=\"#\" style=\"font-weight:700;\">Jeff Bahr<\u002Fa> &nbsp; Jul 13, 2026 Updated 1 hr ago &nbsp; <span style=\"color:#8a8f96;\">💬 0<\u002Fspan><\u002Fdiv>\n\n    <div style=\"max-width:720px;\">\n      <dc-import name=\"AudioPlayer\" bg=\"#0f1216\" accent=\"#2f6fed\" hint-size=\"100%,140px\" style=\"margin:0 0 30px; display:block;\"><\u002Fdc-import>\n    <\u002Fdiv>\n\n    <img src=\"3165ae87-e109-4342-a763-ac96121bffaf\" alt=\"Crash scene in Merrick County\" style=\"display:block; width:100%; height:auto; margin:0 0 14px;\">\n\n    <div style=\"font-family:Arial,sans-serif; font-size:14px; color:#c2c7cd; line-height:1.5; margin-bottom:6px;\">According to a preliminary investigation, the driver of a 2004 Buick LeSabre sedan was traveling west on Highway 30 near 26th Road and crossed the center line Saturday in Merrick County. He struck an eastbound 2014 Peterbilt tractor-trailer.<\u002Fdiv>\n    <div style=\"font-family:Arial,sans-serif; font-size:12px; font-weight:700; letter-spacing:0.03em; color:#8a8f96; margin-bottom:22px;\">MERRICK COUNTY SHERIFF’S OFFICE<\u002Fdiv>\n\n    <div style=\"border-top:1px solid #23272e; padding-top:22px; margin-bottom:22px; display:flex; align-items:center; gap:14px;\">\n      <span style=\"display:inline-flex; align-items:center; gap:8px; border:1px solid #3a3f47; border-radius:3px; padding:8px 12px; font-family:Arial,sans-serif; font-size:13px; color:#cfd3d8;\">G Prefer us on Google <span style=\"width:18px; height:18px; border-radius:50%; background:#2f6fed; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:11px;\">i<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; gap:8px; margin-bottom:34px;\">\n      <sc-for list=\"{{ share }}\" as=\"s\" hint-placeholder-count=\"7\"><span style=\"width:42px; height:42px; border-radius:3px; display:inline-flex; align-items:center; justify-content:center; color:#fff; font-size:16px; background:{{ s.bg }};\">{{ s.i }}<\u002Fspan><\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"max-width:720px;\">\n      <div style=\"font-family:Arial,sans-serif; font-size:15px; color:#9a9fa6; margin-bottom:18px;\">Jeff Bahr<\u002Fdiv>\n\n      <p style=\"font-size:20px; line-height:1.75; margin:0 0 24px;\"><span style=\"float:left; font-size:74px; line-height:0.8; font-weight:700; padding:6px 12px 0 0; color:#fff;\">M<\u002Fspan>errick County deputies responded to a two-vehicle injury collision on Highway 30 near 26th Road on Saturday.<\u002Fp>\n\n      <p style=\"font-size:20px; line-height:1.75; margin:0 0 24px;\">According to a preliminary investigation, the driver of a 2004 Buick LeSabre sedan was traveling west on Highway 30 when the vehicle crossed the center line and struck an eastbound 2014 Peterbilt tractor-trailer, the sheriff’s office said.<\u002Fp>\n\n      <p style=\"font-size:20px; line-height:1.75; margin:0 0 24px;\">The driver of the Buick was injured in the crash and transported for treatment. The driver of the tractor-trailer was not reported injured, according to the preliminary report.<\u002Fp>\n\n      <p style=\"font-size:20px; line-height:1.75; margin:0;\">The collision remains under investigation by the Merrick County Sheriff’s Office.<\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      nav: ['E-edition','News','Obituaries','Opinion','Sports','Puzzmo','Puzzles','Lifestyles','Public Notices','Jobs'],\n      share: [\n        {i:'f', bg:'#3b5998'},\n        {i:'\\uD835\\uDD4F', bg:'#111'},\n        {i:'\\u25A0', bg:'#1d9bf0'},\n        {i:'\\u2709', bg:'#8a949e'},\n        {i:'\\u128424', bg:'#8a949e'},\n        {i:'\\u29C9', bg:'#5a6169'},\n        {i:'\\u2764', bg:'#e0245e'}\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
