document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"4b5a6ca5-ae0a-4d4d-abdb-2427da556d9e\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  body { margin:0; background:#ffffff; }\n  a { color:#2f6aa8; text-decoration:none; }\n  a:hover { text-decoration:underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"font-family:Arial,Helvetica,sans-serif; color:#2b2b2b; background:#fff;\">\n\n  <div style=\"max-width:1560px; margin:0 auto; padding:8px 40px;\">\n    <img src=\"60a9ec77-c956-426c-bed1-64a7a092bc61\" alt=\"JOSPT — Journal of Orthopaedic &amp; Sports Physical Therapy\" style=\"display:block; width:100%; height:auto;\">\n  <\u002Fdiv>\n\n  <div style=\"max-width:1560px; margin:0 auto; padding:26px 40px 70px;\">\n    <div style=\"font-size:13px; color:#666; margin-bottom:20px;\"><a href=\"#\">Home<\u002Fa> › <a href=\"#\">Journal of Orthopaedic &amp; Sports Physical Therapy<\u002Fa> › <a href=\"#\">Just Accepted<\u002Fa> › Timing and Dose Matter: Late High-Speed Exposure and Higher High-Intensity Acceleration Volumes Reduce Hamstring Reinjury Risk in Elite Male Football (Soccer)<\u002Fdiv>\n\n    <div style=\"display:flex; gap:44px; align-items:flex-start;\">\n      <div style=\"flex:1 1 auto; min-width:0;\">\n        <div style=\"font-size:15px; font-weight:700; color:#1b4e7a; margin-bottom:16px;\">NEXT ARTICLE ›<\u002Fdiv>\n        <div style=\"font-size:15px; color:#666; margin-bottom:10px;\">Research Report<\u002Fdiv>\n        <h1 style=\"font-family:Georgia,serif; font-size:34px; font-weight:700; color:#1a1a1a; line-height:1.25; margin:0 0 22px;\">Timing and Dose Matter: Late High-Speed Exposure and Higher High-Intensity Acceleration Volumes Reduce Hamstring Reinjury Risk in Elite Male Football (Soccer)<\u002Fh1>\n\n        <div style=\"font-size:16px; color:#1b4e7a; font-weight:700; margin-bottom:8px;\">AUTHORS ▾<\u002Fdiv>\n        <div style=\"font-size:16px; color:#1b4e7a; font-weight:700; margin-bottom:18px;\">AFFILIATIONS ▾<\u002Fdiv>\n\n        <div style=\"font-size:15px; color:#333; line-height:1.7; margin-bottom:22px;\">Journal of Orthopaedic &amp; Sports Physical Therapy<br>Published Online: July 7, 2026 &nbsp;|&nbsp; Volume 0 Issue ja &nbsp;|&nbsp; Pages 1-26<br><a href=\"#\">https://www.jospt.org/doi/10.2519/jospt.2026.14077<\u002Fa><\u002Fdiv>\n\n        <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:30px; flex-wrap:wrap;\">\n          <button type=\"button\" style=\"background:#eef1f4; border:1px solid #d4d9de; padding:11px 18px; font-family:inherit; font-size:14px; color:#333; display:flex; align-items:center; gap:8px; cursor:pointer;\">📄 PDF<\u002Fbutton>\n          <button type=\"button\" style=\"background:#eef1f4; border:1px solid #d4d9de; padding:11px 18px; font-family:inherit; font-size:14px; color:#333; display:flex; align-items:center; gap:8px; cursor:pointer;\">📄 PDF PLUS<\u002Fbutton>\n          <div style=\"flex:1 1 auto;\"><\u002Fdiv>\n          <button type=\"button\" style=\"background:#eef1f4; border:1px solid #d4d9de; padding:11px 18px; font-family:inherit; font-size:14px; color:#333; cursor:pointer;\">🔧 Tools<\u002Fbutton>\n          <button type=\"button\" style=\"background:#eef1f4; border:1px solid #d4d9de; padding:11px 18px; font-family:inherit; font-size:14px; color:#333; cursor:pointer;\">🔁 Share<\u002Fbutton>\n        <\u002Fdiv>\n\n        <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#1b4e7a\" hint-size=\"100%,140px\" style=\"margin:0 0 30px; display:block;\"><\u002Fdc-import>\n\n        <div style=\"border-top:2px solid #1b4e7a; padding-top:26px;\">\n          <h2 style=\"font-family:Georgia,serif; font-size:24px; font-weight:400; color:#1a1a1a; margin:0 0 22px;\">Abstract<\u002Fh2>\n          <p style=\"font-size:16px; line-height:1.75; margin:0 0 20px;\"><strong>OBJECTIVES:<\u002Fstrong> To (i) investigate whether the timing and magnitude of exposure to high-speed running (HSR), sprinting, and high-intensity accelerations during on-field rehabilitation after hamstring strain injury (HSI) was associated with reinjury risk, and (ii) examine changes in match running performance upon return to play (RTP).<\u002Fp>\n          <p style=\"font-size:16px; line-height:1.75; margin:0 0 20px;\"><strong>DESIGN:<\u002Fstrong> Retrospective cohort study.<\u002Fp>\n          <p style=\"font-size:16px; line-height:1.75; margin:0 0 20px;\"><strong>METHODS:<\u002Fstrong> Data from 95 elite male football (soccer) players from five professional clubs competing in major European and Middle Eastern leagues were analyzed. Players with complete rehabilitation load profiles were included in the 2-month and 6-month reinjury analysis. Modified Poisson regression assessed associations between rehabilitation load characteristics and reinjury risk. Match running performance (HSR distance, sprint distance, and high-intensity accelerations per minute) during the five matches before injury and the first five matches after RTP was compared using paired t-tests for the entire cohort.<\u002Fp>\n          <p style=\"font-size:16px; line-height:1.75; margin:0 0 20px;\"><strong>RESULTS:<\u002Fstrong> Late introduction of HSR, sprinting, and high-intensity accelerations during rehabilitation (i.e., ≥60% of rehabilitation progression) were associated with a significantly lower reinjury risk at 2 months (relative risk [RR] range 0.948–0.969; p&lt;0.01) and 6 months (RR range 0.964–0.979; p&lt;0.05). Higher daily exposure to high-intensity accelerations once introduced was protective (RR = 0.861 (0.778-0.951)). There were no meaningful associations between total volume of HSR or sprinting and reinjury. Match running performance metrics did not differ between preinjury and post-RTP matches (all p&gt;0.05). Changes in performance were not correlated with rehabilitation load characteristics.<\u002Fp>\n          <p style=\"font-size:16px; line-height:1.75; margin:0 0 30px;\"><strong>CONCLUSION:<\u002Fstrong> The timing of high-intensity running exposure during on-field rehabilitation appeared associated with a lower hamstring reinjury risk. Delaying the introduction of HSR, sprinting, and accelerations, followed by a structured and progressive build-up, was associated with lower risk of reinjury without compromising the subsequent match performance of elite male football players.<\u002Fp>\n          <div style=\"border-top:1px solid #ddd; text-align:center; padding-top:24px; font-size:16px; color:#1a1a1a;\">Download PDF<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <aside style=\"flex:0 0 360px;\">\n        <div style=\"border:1px solid #d8d8d8; border-radius:2px;\">\n          <div style=\"display:flex; border-bottom:1px solid #d8d8d8;\">\n            <div style=\"flex:1 1 0; text-align:center; padding:16px 6px; color:#555;\"><div style=\"font-size:22px;\">🖻<\u002Fdiv><div style=\"font-size:12px; margin-top:4px;\">Figures<\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:1 1 0; text-align:center; padding:16px 6px; color:#555;\"><div style=\"font-size:22px;\">🔗<\u002Fdiv><div style=\"font-size:12px; margin-top:4px;\">References<\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:1 1 0; text-align:center; padding:16px 6px; color:#555;\"><div style=\"font-size:22px;\">☰<\u002Fdiv><div style=\"font-size:12px; margin-top:4px;\">Related<\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:1 1 0; text-align:center; padding:16px 6px; color:#1b4e7a; border-bottom:3px solid #1b4e7a;\"><div style=\"font-size:22px;\">ⓘ<\u002Fdiv><div style=\"font-size:12px; margin-top:4px;\">Details<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:24px; text-align:center;\">\n            <img src=\"5f0ac4b2-68f7-4f8b-8869-b938346fddb1\" alt=\"JOSPT cover\" style=\"width:120px; height:auto; display:block; margin:0 auto 16px; border:1px solid #e0e0e0;\">\n            <div style=\"font-size:15px; color:#333; margin-bottom:4px;\">Just Accepted<\u002Fdiv>\n            <div style=\"font-size:15px; color:#333; margin-bottom:20px;\">Pages: 1-50<\u002Fdiv>\n            <div style=\"border-top:1px solid #eee; padding-top:18px;\"><span style=\"border:1px solid #d4d4d4; padding:9px 14px; font-size:14px; color:#333;\">🔖 Crossmark<\u002Fspan><\u002Fdiv>\n            <div style=\"text-align:left; margin-top:22px;\">\n              <div style=\"font-size:17px; font-weight:700; color:#1a1a1a; margin-bottom:12px;\">Keywords<\u002Fdiv>\n              <div style=\"display:flex; gap:8px; flex-wrap:wrap;\"><span style=\"background:#eef1f4; padding:7px 12px; font-size:13px; color:#333; border-radius:2px;\">athletic injuries<\u002Fspan><span style=\"background:#eef1f4; padding:7px 12px; font-size:13px; color:#333; border-radius:2px;\">recurrence<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center; margin-top:26px;\">\n          <div style=\"font-size:11px; letter-spacing:0.14em; color:#b8b8b8; margin-bottom:8px;\">ADVERTISEMENT<\u002Fdiv>\n          <a href=\"#\" style=\"display:block;\"><img src=\"bc311062-f05a-439a-9032-335e8cea215f\" alt=\"Advertisement\" style=\"width:100%; height:auto; display:block; border-radius:2px;\"><\u002Fa>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
