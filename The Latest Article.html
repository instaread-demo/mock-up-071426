  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ace {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"505521e6-28a5-4200-855f-fba170e3fe49\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ca98ce66-6fc6-423d-8a48-854ebea49efb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  a { color: #c0392b; text-decoration: none; }\n  a:hover { text-decoration: underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div data-screen-label=\"Demo disclaimer (top)\" style=\"position:fixed; top:0; left:0; right:0; height:44px; z-index:9999; background:#141414; border-bottom:2px solid #ffd400; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 16px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:14px;\">⚠ DEMO ONLY — Non-commercial recreation for demonstration purposes only. Not affiliated with The Latest Article or Instaread.<\u002Fspan>\n<\u002Fdiv>\n<div data-screen-label=\"Demo disclaimer (bottom-left)\" style=\"position:fixed; bottom:16px; left:16px; z-index:9999; background:#141414; border:2px solid #ffd400; border-radius:8px; padding:8px 14px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; box-shadow:0 4px 14px rgba(0,0,0,0.4);\">\n  <span style=\"color:#ffd400; font-weight:800; font-size:13px;\">DEMO ONLY · For demonstration purposes<\u002Fspan>\n<\u002Fdiv>\n\n<div style=\"padding-top:44px; background:#ffffff; min-height:100vh; font-family:'Lato',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#4a4a4a;\" data-screen-label=\"The Latest Article article\">\n\n  <img src=\"c590d837-4340-410f-afd3-df827d76d5c4\" alt=\"The Latest Article\" style=\"display:block; width:100%; height:auto;\">\n\n  <div style=\"max-width:1320px; margin:0 auto; padding:36px 60px 90px;\">\n\n    <div style=\"font-size:14px; letter-spacing:0.06em; color:#8a8a8a; margin-bottom:8px;\">WEIRD WORLD<\u002Fdiv>\n    <h1 style=\"font-size:44px; font-weight:400; line-height:1.15; margin:0 0 14px; color:#2b2b2b;\">Scientists Discover Unexpected Wind Pattern on Giant Alien Planets<\u002Fh1>\n    <div style=\"font-size:15px; color:#8a8a8a; margin-bottom:30px;\">By <a href=\"#\">Helen Hayward<\u002Fa> , updated on June 18, 2026<\u002Fdiv>\n\n    <div style=\"max-width:860px;\">\n      <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#e11d2a\" hint-size=\"100%,140px\" style=\"margin:0 0 30px; display:block;\"><\u002Fdc-import>\n    <\u002Fdiv>\n\n    <img src=\"d2738ffc-155c-4e51-941f-0c5d9d259eaa\" alt=\"Giant alien planets\" style=\"display:block; width:100%; max-width:860px; height:auto; margin:0 0 8px;\">\n    <div style=\"font-size:12px; color:#b0b0b0; margin-bottom:34px;\">Instagram | earthdotcom | Scientists Discover Unexpected Wind Pattern on Giant Alien Planets<\u002Fdiv>\n\n    <div style=\"max-width:770px; padding-left:44px;\">\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0 0 24px; color:#5b5b5b;\">Astronomers studying some of the hottest planets ever discovered have found something strange happening high above their clouds. These giant alien worlds, known as hot Jupiters, were expected to produce the fastest winds in the galaxy because of their extreme heat. Instead, new observations revealed that many of them have surprisingly slow atmospheric currents.<\u002Fp>\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0 0 34px; color:#5b5b5b;\">The discovery has raised new questions about how these distant planets behave and may offer one of the strongest signs yet of magnetic activity outside the Solar System.<\u002Fp>\n\n      <h2 style=\"font-size:28px; font-weight:400; color:#2b2b2b; margin:0 0 22px;\">A Strange Discovery on Hot Jupiters<\u002Fh2>\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0 0 24px; color:#5b5b5b;\">Hot Jupiters are massive gas planets that orbit dangerously close to their stars. Some complete a full orbit in less than a single Earth day. Because of this close distance, temperatures on these worlds can climb into several thousand degrees.<\u002Fp>\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0 0 24px; color:#5b5b5b;\">Scientists expected these extreme conditions to generate violent atmospheric circulation. Strong heat differences between the permanent day side and permanent night side should push winds to incredible speeds.<\u002Fp>\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0 0 24px; color:#5b5b5b;\">A new study led by astronomer Julia Seidel from Côte d’Azur Observatory in France tells a different story.<\u002Fp>\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0 0 24px; color:#5b5b5b;\">After analyzing seven hot Jupiters, researchers found wind speeds that were far weaker than predicted. While the winds remain far more intense than anything seen in the Solar System, they still fall short of scientific expectations for planets this hot.<\u002Fp>\n\n      <p style=\"font-size:19px; line-height:1.75; margin:0; color:#5b5b5b;\">“The hotter a planet is, the stronger its atmospheric currents should be,” the researchers explained while discussing the puzzling trend.<\u002Fp>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
